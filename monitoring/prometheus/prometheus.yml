# ============================================================
# Prometheus Configuration
# ✅ MONITORING: Thu thập metrics từ các services
# ============================================================

global:
  scrape_interval:     15s   # Lấy metrics mỗi 15 giây
  evaluation_interval: 15s   # Đánh giá rules mỗi 15 giây
  scrape_timeout:      10s

  # Labels gắn vào tất cả time series
  external_labels:
    monitor: 'secure-product-app'
    environment: 'production'

# ─── Alert Rules ─────────────────────────────────────────────
rule_files:
  - "alert_rules.yml"

# ─── Alertmanager ────────────────────────────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# ─── Scrape Configs ──────────────────────────────────────────
scrape_configs:

  # Prometheus tự monitor chính nó
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node.js App metrics (qua /metrics endpoint)
  - job_name: 'nodejs-app'
    static_configs:
      - targets: ['app:3000']
    metrics_path: '/api/metrics'
    scrape_interval: 10s

  # Nginx metrics (nếu dùng nginx-exporter)
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113']
    scrape_interval: 30s

  # MySQL metrics (nếu dùng mysqld_exporter)
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']
    scrape_interval: 30s
