groups:
  - name: app_alerts
    rules:

      # ─── App Down ────────────────────────────────────────
      - alert: AppDown
        expr: up{job="nodejs-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "🚨 App is DOWN"
          description: "Node.js app has been unreachable for more than 1 minute."

      # ─── High CPU ─────────────────────────────────────────
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ High CPU usage"
          description: "CPU usage is above 80% for 5 minutes."

      # ─── High Memory ─────────────────────────────────────
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 > 200
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ High memory usage"
          description: "Memory usage exceeded 200MB."

      # ─── High HTTP Error Rate ─────────────────────────────
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "🚨 High HTTP 5xx error rate"
          description: "More than 10% of requests are returning 5xx errors."

      # ─── Slow Response Time ───────────────────────────────
      - alert: SlowResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ Slow API response time"
          description: "95th percentile response time is above 2 seconds."

      # ─── MySQL Down ───────────────────────────────────────
      - alert: MySQLDown
        expr: mysql_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "🚨 MySQL is DOWN"
          description: "MySQL database is unreachable."

      # ─── Too Many Active Connections ─────────────────────
      - alert: TooManyConnections
        expr: mysql_global_status_threads_connected > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ MySQL too many connections"
          description: "MySQL has more than 80 active connections."
