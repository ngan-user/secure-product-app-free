# ============================================================
# render.yaml — Render.com FREE TIER hoàn toàn
# ✅ $0/tháng — không mất phí
# ⚠️  Web service ngủ sau 15 phút không dùng (free tier)
# ⚠️  PostgreSQL free hết hạn sau 90 ngày
# ============================================================

services:
  # ─── Web Service ─────────────────────────────────────────
  - type: web
    name: secure-product-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: singapore

    # ✅ FREE - không tốn phí
    plan: free

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_TYPE
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: secure-product-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: LOG_LEVEL
        value: info

    healthCheckPath: /api/health
    autoDeploy: true

# ─── FREE PostgreSQL ──────────────────────────────────────
databases:
  - name: secure-product-db
    databaseName: productdb
    user: appuser
    plan: free
    region: singapore
